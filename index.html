<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murphx Watch Party</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #0f0f0f;
            --surface: #1f1f1f;
            --text: #ffffff;
            --accent: #2b2b2b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .active { display: block; }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        /* UI Elements */
        .glass-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
        }

        input {
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--accent);
            background: #2a2a2a;
            color: white;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: var(--transition);
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #ff0f1a;
            transform: scale(1.02);
        }

        /* Room Layout */
        #roomPage {
            display: none; /* Controlled by JS */
            height: 100vh;
            grid-template-columns: 1fr 350px;
            grid-template-rows: auto 1fr;
        }

        #roomHeader {
            grid-column: 1 / 3;
            padding: 15px 30px;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent);
        }

        .video-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        #videoFrame {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            border: none;
            background: black;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* Chat Sidebar */
        #chat {
            background: var(--surface);
            border-left: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            text-align: left;
        }

        .msg-bubble {
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            width: fit-content;
            max-width: 80%;
        }

        .msg-user { color: var(--primary); font-weight: bold; display: block; margin-bottom: 4px; }

        .chat-input-area {
            padding: 20px;
            background: var(--surface);
            display: flex;
            gap: 10px;
        }

        /* Room List */
        .room-card {
            background: var(--surface);
            padding: 20px;
            margin: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .room-card:hover {
            border-color: var(--primary);
            background: var(--accent);
        }
    </style>
</head>
<body>

<div id="loginPage" class="page active center">
    <div class="glass-card">
        <h1 style="color: var(--primary); margin-bottom: 30px;">MURPHX</h1>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Admin Password">
        <button onclick="login()">Enter Theatre</button>
    </div>
</div>

<div id="lobbyPage" class="page center">
    <div style="width: 100%; max-width: 600px;">
        <h2>Active Screens</h2>
        <button onclick="createRoom()" style="width: auto; margin-bottom: 30px;">+ Create New Room</button>
        <div id="roomList"></div>
    </div>
</div>

<div id="roomPage" class="page">
    <div id="roomHeader">
        <h2 id="roomTitle" style="margin:0">Room</h2>
        <div>
            <input id="videoUrl" placeholder="Paste link here..." style="width: 300px; margin:0; padding: 8px;">
            <button onclick="updateVideo()" style="width: auto; margin:0; padding: 8px 15px;">Load</button>
        </div>
    </div>

    <div class="video-container">
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
        <div style="margin-top: 20px; display: flex; gap: 15px;">
            <button id="adminPlay" onclick="playVideo()" style="width: 120px;">▶ Play</button>
            <button id="adminPause" onclick="pauseVideo()" style="width: 120px; background: #555;">⏸ Pause</button>
        </div>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <div class="chat-input-area">
            <input id="msg" placeholder="Say something...">
            <button onclick="sendMsg()" style="width: auto;">Send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
        getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB6cshDZqHpeQtjeOzqI47si-ro55WAbao",
        authDomain: "murphx-watchparty.firebaseapp.com",
        projectId: "murphx-watchparty",
        storageBucket: "murphx-watchparty.firebasestorage.app",
        messagingSenderId: "1075784406236",
        appId: "1:1075784406236:web:9cfe8d836264d7a9bcd019"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let username = "";
    let isAdmin = false;
    let room = "";

    function show(pageId) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
        
        // Use Grid for room page
        if(pageId === 'roomPage') {
            document.getElementById(pageId).style.display = 'grid';
        } else {
            document.getElementById(pageId).style.display = 'flex';
        }
    }

    window.login = () => {
        username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        if (!username) return alert("Enter a username");
        if (password === "murphxadmin") isAdmin = true;
        show("lobbyPage");
        loadRooms();
    }

    function loadRooms() {
        onSnapshot(collection(db, "rooms"), snap => {
            let html = "";
            snap.forEach(d => {
                html += `<div class="room-card" onclick="joinRoom('${d.id}')">
                            <strong>${d.id}</strong><br>
                            <small style="color: #888;">Active now</small>
                         </div>`;
            });
            document.getElementById("roomList").innerHTML = html;
        });
    }

    window.createRoom = async () => {
        let r = prompt("Room Name:");
        if (!r) return;
        await setDoc(doc(db, "rooms", r), { created: Date.now() });
        joinRoom(r);
    }

    window.joinRoom = (r) => {
        room = r;
        show("roomPage");
        document.getElementById("roomTitle").innerText = "Room: " + room;
        
        // Hide admin controls if not admin
        if(!isAdmin) {
            document.getElementById("adminPlay").style.display = 'none';
            document.getElementById("adminPause").style.display = 'none';
            document.getElementById("videoUrl").style.display = 'none';
        }
        
        startRoom();
    }

    // Update the video source for everyone
    window.updateVideo = async () => {
        if(!isAdmin) return;
        let url = document.getElementById("videoUrl").value;
        await setDoc(doc(db, "rooms", room, "sync", "video"), { url: url }, { merge: true });
    }

    function startRoom() {
        const frame = document.getElementById("videoFrame");

        onSnapshot(doc(db, "rooms", room, "sync", "video"), d => {
            let data = d.data();
            if (!data) return;
            if (data.url && frame.src !== data.url) frame.src = data.url;
            
            // Note: Controlling play/pause inside an IFRAME from another site 
            // is technically impossible due to security.
            // This would work for custom players or YouTube API.
        });

        // Chat listener
        const chatQuery = query(collection(db, "rooms", room, "chat"), orderBy("time", "asc"));
        onSnapshot(chatQuery, snap => {
            const container = document.getElementById("messages");
            container.innerHTML = "";
            snap.forEach(d => {
                let m = d.data();
                let div = document.createElement("div");
                div.className = "msg-bubble";
                div.innerHTML = `<span class="msg-user">${m.user}</span> ${m.msg}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    window.sendMsg = () => {
        let text = document.getElementById("msg").value;
        if(!text) return;
        addDoc(collection(db, "rooms", room, "chat"), {
            user: username,
            msg: text,
            time: Date.now()
        });
        document.getElementById("msg").value = "";
    }
</script>
</body>
</html>
